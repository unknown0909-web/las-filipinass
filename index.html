<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Las Filipinas</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body, html {
    height: 100%;
    font-family: 'Cinzel', serif;
    color: #f5f5f5;
    overflow-x: hidden;
}

/* Background */
.hero {
    height: 100vh;
    background: url("/mnt/data/image(28).png") center/cover no-repeat;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Dark overlay + gold tint */
.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        135deg,
        rgba(0,0,0,0.85),
        rgba(0,0,0,0.7),
        rgba(60,0,30,0.4)
    );
}

/* Main content */
.content {
    position: relative;
    text-align: center;
    max-width: 900px;
    padding: 20px;
}

.title {
    font-size: 70px;
    letter-spacing: 6px;
    font-weight: 800;
    color: #d4af37; /* gold */
    text-shadow: 0 0 20px rgba(212,175,55,0.4);
}

.subtitle {
    font-size: 18px;
    margin-top: 10px;
    letter-spacing: 3px;
    color: #f8e6ff; /* rose tint */
    opacity: 0.9;
}

.tagline {
    margin-top: 20px;
    font-size: 16px;
    color: #ccc;
    letter-spacing: 2px;
}

/* Buttons */
.btn {
    margin-top: 30px;
    display: inline-block;
    padding: 14px 28px;
    border: 1px solid #d4af37;
    color: #d4af37;
    text-decoration: none;
    transition: 0.3s;
    letter-spacing: 2px;
}

.btn:hover {
    background: #d4af37;
    color: #000;
    box-shadow: 0 0 20px rgba(212,175,55,0.6);
}

/* Footer features */
.features {
    margin-top: 50px;
    display: flex;
    gap: 30px;
    justify-content: center;
    flex-wrap: wrap;
    font-size: 14px;
    color: #bbb;
}

.feature {
    border-left: 2px solid #d4af37;
    padding-left: 10px;
}
</style>
</head>

<body>

<div class="hero">
    <div class="content">
        <div class="title">LAS FILIPINAS</div>
        <div class="subtitle">A GENTLEMAN COMMUNITY</div>

        <div class="tagline">
            Respect • Loyalty • Class • Filipino Pride
        </div>

        <a class="btn" href="https://discord.gg/55rjZbdg" target="_blank">
            JOIN THE SOCIETY
        </a>

        <div class="features">
            <div class="feature">Gentlemen Culture</div>
            <div class="feature">Gaming & Chill</div>
            <div class="feature">Active Community</div>
            <div class="feature">Loyalty Forever</div>
        </div>
    </div>
</div>

</body>
</html>
